<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>
<title>🎄 ZimSemDem’s 2025 Hersheypark Candylane Bingo 🍫</title>

<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0b1b14;
    color: #ffffff;
    margin: 0;
    padding: 0.75rem;
  }

  h1 {
    text-align: center;
    font-size: 1.2rem;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.45rem;
    max-width: 420px;
    margin: 0 auto;
  }

  .cell {
    aspect-ratio: 1 / 1;
    background: #173b2a;
    border-radius: 0.55rem;
    padding: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 0.78rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  .cell:active {
    transform: scale(0.96);
  }

  .cell.marked {
    background: #e63946;
    font-weight: 600;
  }

  .cell.free {
    background: #457b9d;
    font-weight: 700;
  }

  footer {
    text-align: center;
    margin-top: 0.75rem;
    font-size: 0.7rem;
    opacity: 0.75;
  }
</style>
</head>

<body>

<h1>🎄 ZimSemDem’s 2025 Hersheypark Candylane Bingo 🍫</h1>
<div class="board" id="board"></div>

<footer>
  Refresh for a new board · Tap squares to mark
</footer>

<script>
const pool = [
  "Candylane entry arch",
  "NOEL letters display",
  "Founder’s Way lights",
  "Kissing Tower lights",
  "Boardwalk winter lights",
  "Midway of Misery holiday décor",
  "Giant candy sculpture",
  "Candy-themed light arch",

  "Light-up snowman",
  "Oversized snowflake lights",
  "Candy-cane light tunnel",
  "Christmas tree light display",
  "Candy-shaped light sculpture",
  "Holiday light pathway",
  "Kisses light strands",
  "Wreath light display",

  "Candymonium night ride",
  "Wild Mouse lights view",
  "Cocoa Cruiser train",
  "Laff Trakk exterior glow",
  "Carrousel holiday lighting",
  "Ride queue holiday décor",
  "Closed winter ride sign",

  "Hershey Bar character",
  "Reese’s character",
  "Kisses character",
  "Jolly Rancher character",
  "Candy character group",

  "Character wave",
  "Character dance",
  "Character photo pose",
  "Character meet sign",
  "Character line queue",

  "Hot chocolate stand",
  "Warm pretzel stand",
  "Seasonal candy dessert",
  "Holiday menu board",
  "Free refills station",

  "Lost mitten",
  "Matching family outfits",
  "Santa photo setup",
  "Crying baby",
  "Family argument",
  "Influencer photo pose",
  "Dropped food",
  "Stroller traffic jam",
  "Overdressed toddler",
  "Underprepared teenager",
  "Fogged glasses",
  "Hot drink spill",
  "Park map confusion",
  "Group reunion hug",
  "Grandparents in tow",
  "Tired child carry",
  "Bench rest stop"
];

function shuffle(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

const shuffled = shuffle(pool).slice(0, 24);
shuffled.splice(12, 0, "FREE");

const board = document.getElementById("board");
const boardId = "candylane-random-board";

shuffled.forEach((text, index) => {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.textContent = text;

  const key = `${boardId}-cell-${index}`;

  if (text === "FREE") {
    cell.classList.add("free", "marked");
  }

  if (localStorage.getItem(key) === "marked") {
    cell.classList.add("marked");
  }

  cell.addEventListener("click", () => {
    cell.classList.toggle("marked");
    localStorage.setItem(
      key,
      cell.classList.contains("marked") ? "marked" : ""
    );
  });

  board.appendChild(cell);
});
</script>

</body>
</html>
