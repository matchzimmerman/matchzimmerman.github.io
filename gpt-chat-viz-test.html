<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversational Field (3D)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #0b0c0f;
      color: #eaeef7;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      width: min(420px, calc(100% - 24px));
      background: rgba(14, 16, 22, 0.78);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
      font-size: 12px;
    }

    #hud h1 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      font-size: 11px;
      margin: 4px 4px 0 0;
    }

    #tip {
      position: absolute;
      right: 12px;
      top: 12px;
      width: min(520px, calc(100% - 24px));
      max-height: calc(100% - 24px);
      overflow: auto;
      background: rgba(14, 16, 22, 0.88);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 12px;
      display: none;
      backdrop-filter: blur(10px);
      font-size: 12px;
    }

    #tip h2 {
      margin: 0 0 6px 0;
      font-size: 14px;
    }

    #tip pre {
      white-space: pre-wrap;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    #footer {
      position: absolute;
      left: 12px;
      bottom: 12px;
      font-size: 11px;
      opacity: 0.8;
      background: rgba(14, 16, 22, 0.55);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 6px 10px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>

<body>
<div id="app">
  <div id="hud">
    <h1>Conversational Field (3D)</h1>
    <div class="badge">Vertices = turns</div>
    <div class="badge">Faces = interactions</div>
    <div class="badge">X = time</div>
    <div class="badge">Y = stability</div>
    <div class="badge">Z = compression</div>
    <div class="badge">Tap node to inspect</div>
  </div>

  <div id="tip">
    <h2 id="tipTitle"></h2>
    <div id="tipMeta"></div>
    <pre id="tipText"></pre>
  </div>

  <div id="footer">
    Drag = orbit · Pinch = zoom · Tap = inspect
  </div>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

/* ---------------------------------------------
   🔧 SAMPLE DATA (replace with CSV-derived JSON)
   --------------------------------------------- */

const DATA = [
  {
    interaction_index: 1,
    role: "user",
    text: "I’m trying to understand how coherence emerges here.",
    repair_rate_20: 0.8,
    compression_momentum_20: 1,
    resonance_event: false
  },
  {
    interaction_index: 1,
    role: "assistant",
    text: "Let’s define coherence structurally, not intuitively.",
    repair_rate_20: 0.8,
    compression_momentum_20: 1,
    resonance_event: false
  },
  {
    interaction_index: 2,
    role: "user",
    text: "So resonance alone isn’t enough?",
    repair_rate_20: 0.6,
    compression_momentum_20: 2,
    resonance_event: true
  },
  {
    interaction_index: 2,
    role: "assistant",
    text: "Right. It has to accumulate and persist.",
    repair_rate_20: 0.6,
    compression_momentum_20: 2,
    resonance_event: true
  }
];

/* --------------------------------------------- */

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0c0f);

const camera = new THREE.PerspectiveCamera(
  55,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(10, 6, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("app").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(4, 3, 0);

scene.add(new THREE.HemisphereLight(0xffffff, 0x111827, 1));

/* ---------------------------------------------
   Build nodes
--------------------------------------------- */

const nodes = [];
const geometry = new THREE.SphereGeometry(0.15, 12, 12);

DATA.forEach((d, i) => {
  const color = d.role === "user" ? 0x7dd3fc : 0xa78bfa;
  const material = new THREE.MeshStandardMaterial({ color });
  const sphere = new THREE.Mesh(geometry, material);

  sphere.position.set(
    d.interaction_index * 1.5,
    (1 - d.repair_rate_20) * 5,
    d.compression_momentum_20
  );

  sphere.userData = d;
  scene.add(sphere);
  nodes.push(sphere);
});

/* ---------------------------------------------
   Interaction
--------------------------------------------- */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tip = document.getElementById("tip");

renderer.domElement.addEventListener("pointerdown", e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodes);

  if (hits.length) {
    const d = hits[0].object.userData;
    document.getElementById("tipTitle").textContent =
      `${d.role.toUpperCase()} — interaction ${d.interaction_index}`;
    document.getElementById("tipMeta").innerHTML = `
      <div class="badge">repair_rate_20: ${d.repair_rate_20}</div>
      <div class="badge">compression: ${d.compression_momentum_20}</div>
      <div class="badge">resonance: ${d.resonance_event}</div>
    `;
    document.getElementById("tipText").textContent = d.text;
    tip.style.display = "block";
  }
});

/* --------------------------------------------- */

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
