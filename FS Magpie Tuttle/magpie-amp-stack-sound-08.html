<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MAGPIE AMP HUM — v6</title>
  <style>
    html,body {
      background:#000;color:#fff;height:100%;margin:0;
      display:flex;align-items:center;justify-content:center;
      font-family:monospace;
    }
    #start {
      border:1px solid #fff;padding:10px 20px;font-size:1.2em;cursor:pointer;
    }
  </style>
</head>
<body>
  <div id="start">activate magpie hum</div>
  <script>
  const startButton=document.getElementById('start');
  startButton.addEventListener('click',()=>{
    startButton.remove();
    const ctx=new (window.AudioContext||window.webkitAudioContext)();

    /* === CONTINUOUS STATIC BED === */
    const noiseBuf=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate);
    const data=noiseBuf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;

    const noise=ctx.createBufferSource();
    noise.buffer=noiseBuf;
    noise.loop=true;
    const noiseFilter=ctx.createBiquadFilter();
    noiseFilter.type='lowpass';
    noiseFilter.frequency.value=600+Math.random()*400;
    const noiseGain=ctx.createGain();
    noiseGain.gain.value=0.035;
    noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);
    noise.start();

    /* subtle evolving filter motion */
    setInterval(()=>{
      noiseFilter.frequency.linearRampToValueAtTime(
        400+Math.random()*800,
        ctx.currentTime+5+Math.random()*10
      );
    },10000);

    /* === HUM LAYER === */
    function makeHum(){
      const o=ctx.createOscillator();
      o.type='sine';
      o.frequency.value=45+Math.random()*35;
      const g=ctx.createGain();
      g.gain.value=0.03+Math.random()*0.02;
      o.connect(g).connect(ctx.destination);
      o.start();
      /* random detune drift */
      setInterval(()=>{o.frequency.linearRampToValueAtTime(45+Math.random()*35,ctx.currentTime+8+Math.random()*8);},8000+Math.random()*4000);
    }
    for(let i=0;i<2;i++) makeHum(); // layered hums for body

    /* === RANDOM MICRO-STUTTERS (ON/OFF WRAPS) === */
    function stutter(){
      const t=ctx.currentTime;
      const dur=0.05+Math.random()*0.1;
      const dip=ctx.createGain();
      dip.gain.value=1.0;
      dip.connect(ctx.destination);
      noiseGain.disconnect(); noiseGain.connect(dip);
      setTimeout(()=>{dip.gain.setValueAtTime(0.3,t+0.01);dip.gain.linearRampToValueAtTime(1.0,t+dur);},0);
      setTimeout(stutter,15000+Math.random()*25000);
    }
    // subtle global stutters but not total cutouts
    stutter();

    /* === MID-HIGH SIGNAL BLIPS === */
    const arpGain=ctx.createGain();arpGain.gain.value=0.03;
    arpGain.connect(ctx.destination);

    function makeBlip(freq,dur,delay=0){
      const o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(freq,ctx.currentTime);
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.0001,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(0.05,ctx.currentTime+delay+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+delay+dur);
      o.connect(g).connect(arpGain);
      o.start(ctx.currentTime+delay);
      o.stop(ctx.currentTime+delay+dur);
    }

    function arpBurst(){
      const base=400+Math.random()*800;
      const count=1+Math.floor(Math.random()*4);
      for(let i=0;i<count;i++){
        const note=base*Math.pow(2,Math.random()*0.25);
        const dur=0.07+Math.random()*0.15;
        const delay=i*(0.05+Math.random()*0.1);
        makeBlip(note,dur,delay);
      }
      const next=3000+Math.random()*12000;
      setTimeout(arpBurst,next);
    }
    arpBurst();

    /* === INTERFERENCE GLITCHES (without silence) === */
    function breakup(){
      const o=ctx.createOscillator();o.type='square';
      const g=ctx.createGain();g.gain.value=0.015;
      o.connect(g).connect(ctx.destination);
      const start=300+Math.random()*700;
      const end=start+(Math.random()*500-250);
      o.frequency.setValueAtTime(start,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(end,ctx.currentTime+0.2);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.25);
      o.start();o.stop(ctx.currentTime+0.25);
      setTimeout(breakup,20000+Math.random()*40000);
    }
    breakup();

    /* === LONG SLOW SCANNER SWEEPS === */
    function scan(){
      const o=ctx.createOscillator();o.type='sine';
      const g=ctx.createGain();g.gain.value=0.01;
      o.connect(g).connect(ctx.destination);
      const s=200+Math.random()*400,e=1000+Math.random()*800;
      const dur=1.0+Math.random()*1.5;
      o.frequency.setValueAtTime(s,ctx.currentTime);
      o.frequency.linearRampToValueAtTime(e,ctx.currentTime+dur);
      g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
      o.start();o.stop(ctx.currentTime+dur);
      setTimeout(scan,25000+Math.random()*30000);
    }
    scan();
  });
  </script>
</body>
</html>
