name: MAGPIE lineage bootstrap

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/archive-lineage-bootstrap.yml'

permissions:
  contents: write

concurrency:
  group: magpie-archive-cycle
  cancel-in-progress: false

jobs:
  bootstrap-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate lineage origin and first child
        run: |
          python scripts/archive_cycle.py --generator field-station-signal-loop
          python scripts/archive_cycle.py --generator field-station-signal-loop

      - name: Verify inherited lineage
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          records = []
          for path in (root / 'archive' / 'records').glob('*.json'):
              record = json.loads(path.read_text(encoding='utf-8'))
              if record.get('generator_id') == 'MZFS.GEN.0002' and record.get('lineage_generation'):
                  records.append(record)

          records.sort(key=lambda item: int(item['lineage_generation']))
          if len(records) < 2:
              raise SystemExit('Expected at least two lineage-aware signal-loop records.')

          parent, child = records[-2], records[-1]
          assert child['parent_archive_id'] == parent['id'], (parent['id'], child.get('parent_archive_id'))
          assert int(child['lineage_generation']) == int(parent['lineage_generation']) + 1
          assert child['metrics_before'] == parent['metrics_after']
          for field in ('key_change_type', 'key_change_value', 'key_change_certainty', 'key_change_text'):
              assert child.get(field) not in (None, ''), field

          state_path = root / 'data' / 'generator-state' / 'field-station-signal-loop.json'
          state = json.loads(state_path.read_text(encoding='utf-8'))
          assert state['current_archive_id'] == child['id']
          assert int(state['generation']) == int(child['lineage_generation'])

          print(json.dumps({
              'parent': parent['id'],
              'child': child['id'],
              'parent_generation': parent['lineage_generation'],
              'child_generation': child['lineage_generation'],
              'key_change_type': child['key_change_type'],
              'key_change_certainty': child['key_change_certainty'],
          }, indent=2))
          PY

      - name: Commit verified lineage bootstrap
        run: |
          git config user.name "MZFS archive process"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/archive-lineage-bootstrap.yml
          git add -A
          git status --short
          git commit -m "archive: bootstrap verified evolving lineage"
          git push
