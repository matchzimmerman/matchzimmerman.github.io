name: Seed behavioral cartography iterations

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/behavioral-cartography-initial-iterations.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: behavioral-cartography-initial-iterations
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install generator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy opencv-python-headless
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Synchronize package registry
        run: |
          python scripts/sync_magpie_systems.py
          python scripts/build_archive_index.py

      - name: Generate initial retained manual iterations
        run: |
          if grep -R '"generator_id": "MZFS.GEN.0006"' archive/records >/dev/null 2>&1; then
            echo "Behavioral cartography already has retained iterations; skipping seed run."
          else
            python scripts/manual_archive_cycle.py --generator behavioral-cartography --seed 1701
            python scripts/manual_archive_cycle.py --generator behavioral-cartography --seed 2307
            python scripts/manual_archive_cycle.py --generator behavioral-cartography --seed 4812
          fi

      - name: Commit generated records and media
        run: |
          git config user.name "MZFS recovery process"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "archive: retain initial behavioral cartography iterations"
          git pull --rebase origin main
          git push
