name: MAGPIE archive cycle

on:
  workflow_dispatch:
    inputs:
      generator:
        description: Optional registered generator slug
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - '.github/workflows/magpie-archive-cycle.yml'
  schedule:
    - cron: '2,17,32,47 * * * *'

permissions:
  contents: write

concurrency:
  group: magpie-archive-cycle
  cancel-in-progress: false

jobs:
  execute-and-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate one immutable execution
        env:
          REQUESTED_GENERATOR: ${{ inputs.generator }}
        run: |
          if [ -n "$REQUESTED_GENERATOR" ]; then
            python scripts/archive_cycle.py --generator "$REQUESTED_GENERATOR"
          else
            python scripts/archive_cycle.py --minimum-age-minutes 50
          fi

      - name: Commit archive growth
        run: |
          git config user.name "MZFS archive process"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "archive: retain inherited procedural execution"
          git push
