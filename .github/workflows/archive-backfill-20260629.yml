name: Archive backfill 2026-06-29

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/archive-backfill-20260629.yml'

permissions:
  contents: write

concurrency:
  group: archive-backfill-20260629
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate missing hourly executions
        run: |
          python scripts/archive_cycle.py --timestamp 2026-06-29T11:00:00Z
          python scripts/archive_cycle.py --timestamp 2026-06-29T12:00:00Z
          python scripts/archive_cycle.py --timestamp 2026-06-29T13:00:00Z
          python scripts/archive_cycle.py --timestamp 2026-06-29T14:00:00Z

      - name: Commit backfilled archive records
        run: |
          git config user.name "MZFS archive process"
          git config user.email "actions@users.noreply.github.com"
          git add archive/records archive/executions data/archive-index.json
          git commit -m "archive: backfill hourly executions since 6 AM"
          git push
